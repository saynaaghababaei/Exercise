<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flag Sniper — Geography Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #121820;
      --surface2: #1a2230;
      --border: #2a3548;
      --text: #e8edf5;
      --muted: #8b9bb4;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
      --danger: #ff4466;
      --warning: #ffaa00;
      --radius: 12px;
      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 1.25rem 0 0.75rem;
    }

    .logo {
      font-family: var(--font-head);
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      letter-spacing: 0.04em;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 40px rgba(0, 255, 136, 0.35);
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    /* Loading */
    .loading-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 3rem 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Cards & panels */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .panel h2 {
      font-family: var(--font-head);
      font-size: 1.5rem;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    /* XP bar */
    .xp-bar-wrap { margin-bottom: 1rem; }
    .xp-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .xp-labels strong { color: var(--accent); }
    .xp-track {
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .xp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Difficulty */
    .diff-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .diff-btn {
      padding: 0.75rem 0.5rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .diff-btn span {
      display: block;
      font-size: 0.65rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 0.15rem;
    }

    .diff-btn:hover { border-color: var(--accent-dim); }
    .diff-btn.selected {
      border-color: var(--accent);
      background: rgba(0, 255, 136, 0.1);
      color: var(--accent);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem 1.25rem;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #0a0e14;
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-dim); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      margin-top: 0.5rem;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* Game HUD */
    .hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-size: 0.8rem;
    }

    .hud .score { text-align: left; font-weight: 700; }
    .hud .score span { color: var(--accent); font-size: 1.1rem; }
    .hud .q-num { text-align: center; color: var(--muted); }
    .hud .streak { text-align: right; }
    .hud .streak.hot { color: var(--warning); }
    .hud .streak.fire { color: var(--accent); }

    .timer-wrap {
      position: relative;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.1s linear;
    }

    .timer-bar.low { background: var(--danger); }

    .q-type-badge {
      display: inline-block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--surface2);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }

    .question-prompt {
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 1rem;
    }

    .flag-display {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 1rem;
      min-height: 100px;
    }

    .flag-display img {
      max-width: 200px;
      width: 100%;
      height: auto;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border);
    }

    .flag-display.dual {
      gap: 1rem;
      flex-wrap: wrap;
    }

    .flag-display.dual .flag-card {
      flex: 1;
      min-width: 120px;
      max-width: 160px;
      text-align: center;
      cursor: pointer;
      padding: 0.75rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      transition: border-color 0.2s, transform 0.15s;
    }

    .flag-display.dual .flag-card:hover:not(.disabled) {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .flag-display.dual .flag-card img {
      max-width: 100%;
      margin-bottom: 0.5rem;
    }

    .flag-display.dual .flag-card.disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    .country-name-lg {
      font-family: var(--font-head);
      font-size: 2rem;
      letter-spacing: 0.04em;
      text-align: center;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .option-btn {
      padding: 0.85rem 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent-dim);
      background: rgba(0, 255, 136, 0.06);
    }

    .option-btn.correct {
      border-color: var(--accent);
      background: rgba(0, 255, 136, 0.15);
      color: var(--accent);
    }

    .option-btn.wrong {
      border-color: var(--danger);
      background: rgba(255, 68, 102, 0.12);
      color: var(--danger);
    }

    .option-btn:disabled { cursor: default; }

    /* Results */
    .results-hero {
      text-align: center;
      padding: 1rem 0;
    }

    .results-hero .final-score {
      font-family: var(--font-head);
      font-size: 4rem;
      color: var(--accent);
      line-height: 1;
    }

    .results-hero p { color: var(--muted); margin-top: 0.5rem; }

    .breakdown {
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 1rem;
    }

    .breakdown-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .breakdown-item:last-child { border-bottom: none; }

    .breakdown-item .icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .breakdown-item .icon.ok { background: rgba(0, 255, 136, 0.2); color: var(--accent); }
    .breakdown-item .icon.no { background: rgba(255, 68, 102, 0.2); color: var(--danger); }

    .breakdown-item img {
      width: 36px;
      height: 24px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    .breakdown-item .detail { flex: 1; min-width: 0; }
    .breakdown-item .detail strong { display: block; }
    .breakdown-item .detail small { color: var(--muted); }

    /* Leaderboard */
    .lb-list { list-style: none; }
    .lb-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .lb-list li:last-child { border-bottom: none; }
    .lb-list .rank { color: var(--accent); font-weight: 700; width: 2rem; }
    .lb-list .pts { font-weight: 600; }

    .name-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      margin-bottom: 0.75rem;
    }

    .name-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .error-msg {
      color: var(--danger);
      text-align: center;
      padding: 1rem;
      font-size: 0.9rem;
    }

    .hidden { display: none !important; }

    @media (max-width: 380px) {
      .diff-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <div class="app">
    <header>
      <h1 class="logo">FLAG SNIPER</h1>
      <p class="tagline">Geography quiz — flags, capitals, regions &amp; population</p>
    </header>

    <!-- Loading -->
    <section id="screen-loading" class="screen active">
      <div class="loading-wrap">
        <div class="spinner" id="loading-spinner" aria-hidden="true"></div>
        <p id="loading-text">Loading countries…</p>
        <button type="button" class="btn btn-primary hidden" id="btn-retry" style="max-width:220px">Try again</button>
      </div>
    </section>

    <!-- Menu -->
    <section id="screen-menu" class="screen">
      <div class="xp-bar-wrap panel">
        <div class="xp-labels">
          <span>Level: <strong id="level-name">Rookie</strong></span>
          <span><strong id="xp-total">0</strong> XP</span>
        </div>
        <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width: 0%"></div></div>
      </div>

      <div class="panel">
        <h2>Difficulty</h2>
        <div class="diff-grid" role="group" aria-label="Difficulty">
          <button type="button" class="diff-btn selected" data-diff="easy">Easy<span>15s</span></button>
          <button type="button" class="diff-btn" data-diff="medium">Medium<span>10s</span></button>
          <button type="button" class="diff-btn" data-diff="hard">Hard<span>7s</span></button>
        </div>
        <button type="button" class="btn btn-primary" id="btn-start">Start Game</button>
      </div>

      <div class="panel">
        <h2>Leaderboard</h2>
        <ol class="lb-list" id="leaderboard"></ol>
        <p id="lb-empty" class="tagline" style="text-align:center;padding:0.5rem">No scores yet. Be the first!</p>
      </div>
    </section>

    <!-- Game -->
    <section id="screen-game" class="screen">
      <div class="hud">
        <div class="score">Score: <span id="hud-score">0</span></div>
        <div class="q-num" id="hud-q">1 / 10</div>
        <div class="streak" id="hud-streak">🔥 0</div>
      </div>
      <div class="timer-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>

      <div class="panel" style="flex:1">
        <span class="q-type-badge" id="q-type-label">Flag ID</span>
        <p class="question-prompt" id="q-prompt"></p>
        <div id="q-visual"></div>
        <div class="options" id="q-options"></div>
      </div>
    </section>

    <!-- Results -->
    <section id="screen-results" class="screen">
      <div class="results-hero panel">
        <p>Final Score</p>
        <div class="final-score" id="final-score">0</div>
        <p id="results-summary"></p>
        <p id="xp-earned" style="color:var(--accent);margin-top:0.5rem;font-weight:600"></p>
      </div>

      <div class="panel">
        <h2>Breakdown</h2>
        <div class="breakdown" id="breakdown"></div>
      </div>

      <div class="panel" id="save-score-panel">
        <h2>Save Score</h2>
        <input type="text" class="name-input" id="player-name" placeholder="Your name" maxlength="20" />
        <button type="button" class="btn btn-primary" id="btn-save-score">Save to Leaderboard</button>
      </div>

      <button type="button" class="btn btn-primary" id="btn-play-again">Play Again</button>
      <button type="button" class="btn btn-ghost" id="btn-menu">Back to Menu</button>
    </section>

    <p id="fetch-error" class="error-msg hidden"></p>
  </div>

  <script>
    const API_SOURCES = [
      {
        id: 'restcountries',
        url: 'https://restcountries.com/v3.1/all?fields=name,flags,capital,region,population',
        normalize: normalizeRestCountries,
        timeoutMs: 8000,
      },
      {
        id: 'cdn',
        url: 'https://cdn.jsdelivr.net/gh/dr5hn/countries-states-cities-database@master/json/countries.json',
        normalize: normalizeCdnCountries,
        timeoutMs: 20000,
      },
    ];
    const QUESTIONS_PER_GAME = 10;
    const REGIONS = ['Africa', 'Americas', 'Asia', 'Europe', 'Oceania'];

    const LEVELS = [
      { name: 'Rookie', minXp: 0 },
      { name: 'Scout', minXp: 150 },
      { name: 'Explorer', minXp: 400 },
      { name: 'Navigator', minXp: 800 },
      { name: 'Cartographer', minXp: 1400 },
      { name: 'Strategist', minXp: 2200 },
      { name: 'Ambassador', minXp: 3200 },
      { name: 'GeoGenius', minXp: 4500 },
    ];

    const TIMERS = { easy: 15, medium: 10, hard: 7 };
    const BASE_POINTS = { easy: 100, medium: 150, hard: 200 };
    const XP_PER_CORRECT = { easy: 25, medium: 40, hard: 60 };

    const Q_TYPES = ['flag', 'capital', 'continent', 'higher'];

    const STORAGE = {
      xp: 'flagsniper_xp',
      leaderboard: 'flagsniper_leaderboard',
    };

    let countries = [];
    let difficulty = 'easy';
    let gameState = null;
    let timerInterval = null;
    let confettiAnim = null;

    const $ = (id) => document.getElementById(id);
    const screens = {
      loading: $('screen-loading'),
      menu: $('screen-menu'),
      game: $('screen-game'),
      results: $('screen-results'),
    };

    function showScreen(name) {
      Object.values(screens).forEach((s) => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickRandom(arr, n, exclude = []) {
      const pool = arr.filter((x) => !exclude.includes(x));
      return shuffle(pool).slice(0, n);
    }

    function getXp() {
      return parseInt(localStorage.getItem(STORAGE.xp) || '0', 10);
    }

    function setXp(xp) {
      localStorage.setItem(STORAGE.xp, String(xp));
    }

    function getLevelInfo(xp) {
      let level = LEVELS[0];
      let next = LEVELS[1];
      for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (xp >= LEVELS[i].minXp) {
          level = LEVELS[i];
          next = LEVELS[i + 1] || null;
          break;
        }
      }
      return { level, next };
    }

    function updateXpUI() {
      const xp = getXp();
      const { level, next } = getLevelInfo(xp);
      $('level-name').textContent = level.name;
      $('xp-total').textContent = xp;
      let pct = 100;
      if (next) {
        const range = next.minXp - level.minXp;
        const progress = xp - level.minXp;
        pct = Math.min(100, (progress / range) * 100);
      }
      $('xp-fill').style.width = pct + '%';
    }

    function getLeaderboard() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE.leaderboard) || '[]');
      } catch {
        return [];
      }
    }

    function saveLeaderboard(list) {
      localStorage.setItem(STORAGE.leaderboard, JSON.stringify(list));
    }

    function renderLeaderboard() {
      const list = getLeaderboard().slice(0, 10);
      const el = $('leaderboard');
      const empty = $('lb-empty');
      el.innerHTML = '';
      if (!list.length) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      list.forEach((entry, i) => {
        const li = document.createElement('li');
        li.innerHTML = `<span class="rank">#${i + 1}</span><span>${escapeHtml(entry.name)} · ${entry.difficulty}</span><span class="pts">${entry.score}</span>`;
        el.appendChild(li);
      });
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function normalizeRestCountries(data) {
      if (!Array.isArray(data)) throw new Error('Invalid API response');
      return data
        .filter(
          (c) =>
            c.name?.common &&
            c.flags?.png &&
            c.capital?.[0] &&
            c.region &&
            typeof c.population === 'number' &&
            c.population > 0 &&
            REGIONS.includes(c.region)
        )
        .map((c) => ({
          name: c.name.common,
          flag: c.flags.png,
          capital: c.capital[0],
          region: c.region,
          population: c.population,
        }));
    }

    function normalizeCdnCountries(data) {
      if (!Array.isArray(data)) throw new Error('Invalid API response');
      return data
        .filter(
          (c) =>
            c.name &&
            c.capital &&
            c.iso2 &&
            c.region &&
            REGIONS.includes(c.region) &&
            Number(c.population) > 0
        )
        .map((c) => ({
          name: c.name,
          flag: `https://flagcdn.com/w320/${String(c.iso2).toLowerCase()}.png`,
          capital: c.capital,
          region: c.region,
          population: Number(c.population),
        }));
    }

    async function fetchWithTimeout(url, ms) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), ms);
      try {
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        return res;
      } catch (err) {
        clearTimeout(timer);
        throw err;
      }
    }

    function resetLoadingUI() {
      $('loading-spinner').classList.remove('hidden');
      $('loading-text').textContent = 'Loading countries…';
      $('btn-retry').classList.add('hidden');
      $('fetch-error').classList.add('hidden');
    }

    function loadingFailed(message) {
      $('loading-spinner').classList.add('hidden');
      $('loading-text').textContent = 'Could not load country data';
      $('fetch-error').textContent = message;
      $('fetch-error').classList.remove('hidden');
      $('btn-retry').classList.remove('hidden');
    }

    async function loadCountries() {
      showScreen('loading');
      resetLoadingUI();

      let lastError = null;

      for (const source of API_SOURCES) {
        $('loading-text').textContent =
          source.id === 'restcountries'
            ? 'Loading countries…'
            : 'Primary source unavailable — trying backup…';

        try {
          const res = await fetchWithTimeout(source.url, source.timeoutMs);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const list = source.normalize(data);
          if (list.length < 20) throw new Error('Not enough country data');
          countries = list;
          updateXpUI();
          renderLeaderboard();
          showScreen('menu');
          return;
        } catch (err) {
          lastError = err;
          console.warn(`[Flag Sniper] ${source.id} failed:`, err);
        }
      }

      const isAbort = lastError?.name === 'AbortError';
      const isNetwork =
        lastError?.message === 'Failed to fetch' ||
        lastError?.name === 'TypeError';

      let hint =
        'Check your internet connection and try again. If you opened the file directly, run a local server: python3 -m http.server then open http://localhost:8000';

      if (isAbort) {
        hint = 'The request timed out. Your network may block restcountries.com — press Try again (backup CDN will be used).';
      } else if (isNetwork) {
        hint =
          'Browser blocked the request (network or CORS). Use a local server instead of opening the file directly: python3 -m http.server';
      }

      loadingFailed(hint);
    }

    function streakMultiplier(streak) {
      if (streak >= 5) return 3;
      if (streak >= 3) return 2;
      return 1;
    }

    function buildQuestions() {
      const pool = [];
      Q_TYPES.forEach((t) => { pool.push(t, t, t); });
      pool.push(Q_TYPES[Math.floor(Math.random() * Q_TYPES.length)]);
      return shuffle(pool).slice(0, QUESTIONS_PER_GAME).map((type) => buildQuestion(type));
    }

    function buildQuestion(type) {
      const correct = countries[Math.floor(Math.random() * countries.length)];

      switch (type) {
        case 'flag': {
          const wrong = pickRandom(
            countries.map((c) => c.name),
            3,
            [correct.name]
          );
          const options = shuffle([correct.name, ...wrong]);
          return {
            type,
            label: 'Flag ID',
            prompt: 'Which country is this flag?',
            correct: correct.name,
            options,
            visual: { kind: 'flag', src: correct.flag, alt: 'Flag' },
            meta: correct,
          };
        }
        case 'capital': {
          const wrong = pickRandom(
            countries.map((c) => c.capital),
            3,
            [correct.capital]
          );
          const options = shuffle([correct.capital, ...wrong]);
          return {
            type,
            label: 'Capital',
            prompt: `What is the capital of ${correct.name}?`,
            correct: correct.capital,
            options,
            visual: { kind: 'name', text: correct.name },
            meta: correct,
          };
        }
        case 'continent': {
          const wrong = pickRandom(REGIONS, 4, [correct.region]);
          const options = shuffle([correct.region, ...wrong]);
          return {
            type,
            label: 'Continent',
            prompt: 'Which region is this country in?',
            correct: correct.region,
            options,
            visual: { kind: 'flag', src: correct.flag, alt: correct.name },
            meta: correct,
          };
        }
        case 'higher': {
          let other = countries[Math.floor(Math.random() * countries.length)];
          let attempts = 0;
          while ((other.name === correct.name || other.population === correct.population) && attempts < 50) {
            other = countries[Math.floor(Math.random() * countries.length)];
            attempts++;
          }
          const higher = correct.population >= other.population ? correct : other;
          return {
            type,
            label: 'Higher or Lower',
            prompt: 'Which country has the higher population?',
            correct: higher.name,
            options: [correct.name, other.name],
            visual: {
              kind: 'dual',
              a: correct,
              b: other,
            },
            meta: { correct, other, higher: higher.name },
          };
        }
        default:
          return buildQuestion('flag');
      }
    }

    function startGame() {
      clearTimer();
      const questions = buildQuestions();
      gameState = {
        difficulty,
        questions,
        index: 0,
        score: 0,
        streak: 0,
        maxStreak: 0,
        results: [],
        xpThisGame: 0,
        answered: false,
      };
      $('hud-score').textContent = '0';
      showScreen('game');
      showQuestion();
    }

    function clearTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function showQuestion() {
      const gs = gameState;
      const q = gs.questions[gs.index];
      gs.answered = false;

      $('hud-q').textContent = `${gs.index + 1} / ${QUESTIONS_PER_GAME}`;
      $('q-type-label').textContent = q.label;
      $('q-prompt').textContent = q.prompt;

      const visual = $('q-visual');
      const optionsEl = $('q-options');
      visual.innerHTML = '';
      optionsEl.innerHTML = '';

      if (q.visual.kind === 'flag') {
        visual.innerHTML = `<div class="flag-display"><img src="${q.visual.src}" alt="${escapeHtml(q.visual.alt)}" loading="lazy" /></div>`;
      } else if (q.visual.kind === 'name') {
        visual.innerHTML = `<div class="country-name-lg">${escapeHtml(q.visual.text)}</div>`;
      } else if (q.visual.kind === 'dual') {
        const { a, b } = q.visual;
        visual.innerHTML = `<div class="flag-display dual">
          <button type="button" class="flag-card" data-choice="${escapeHtml(a.name)}">
            <img src="${a.flag}" alt="${escapeHtml(a.name)}" loading="lazy" />
            <span>${escapeHtml(a.name)}</span>
          </button>
          <button type="button" class="flag-card" data-choice="${escapeHtml(b.name)}">
            <img src="${b.flag}" alt="${escapeHtml(b.name)}" loading="lazy" />
            <span>${escapeHtml(b.name)}</span>
          </button>
        </div>`;
        visual.querySelectorAll('.flag-card').forEach((btn) => {
          btn.addEventListener('click', () => submitAnswer(btn.dataset.choice));
        });
      }

      if (q.type !== 'higher') {
        q.options.forEach((opt) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'option-btn';
          btn.textContent = opt;
          btn.addEventListener('click', () => submitAnswer(opt));
          optionsEl.appendChild(btn);
        });
      }

      updateStreakHUD();
      startTimer();
    }

    function startTimer() {
      clearTimer();
      const total = TIMERS[gameState.difficulty];
      let remaining = total;
      const bar = $('timer-bar');

      function tick() {
        const pct = (remaining / total) * 100;
        bar.style.width = pct + '%';
        bar.classList.toggle('low', remaining <= 3);
        if (remaining <= 0) {
          clearTimer();
          if (!gameState.answered) submitAnswer(null, true);
          return;
        }
        remaining -= 0.1;
      }

      tick();
      timerInterval = setInterval(tick, 100);
    }

    function updateStreakHUD() {
      const el = $('hud-streak');
      const s = gameState.streak;
      el.textContent = `🔥 ${s}`;
      el.classList.remove('hot', 'fire');
      if (s >= 5) el.classList.add('fire');
      else if (s >= 3) el.classList.add('hot');
    }

    function submitAnswer(choice, timedOut = false) {
      if (gameState.answered) return;
      gameState.answered = true;
      clearTimer();

      const q = gameState.questions[gameState.index];
      const correct = choice === q.correct;
      let points = 0;
      let xpGain = 0;

      if (correct) {
        const newStreak = gameState.streak + 1;
        const mult = streakMultiplier(newStreak);
        gameState.streak = newStreak;
        gameState.maxStreak = Math.max(gameState.maxStreak, newStreak);
        const base = BASE_POINTS[gameState.difficulty];
        const timeLeft = parseFloat($('timer-bar').style.width) / 100;
        const timeBonus = Math.round(base * 0.3 * timeLeft);
        points = Math.round((base + timeBonus) * mult);
        xpGain = XP_PER_CORRECT[gameState.difficulty] + (mult > 1 ? 15 * mult : 0);
        gameState.score += points;
        gameState.xpThisGame += xpGain;
        fireConfetti();
      } else {
        gameState.streak = 0;
      }

      gameState.results.push({
        type: q.label,
        correct,
        timedOut,
        choice: choice || '(timeout)',
        answer: q.correct,
        points,
        meta: q.meta,
        q,
      });

      highlightAnswers(q, choice, correct);

      $('hud-score').textContent = gameState.score;
      updateStreakHUD();

      setTimeout(() => {
        gameState.index += 1;
        if (gameState.index >= QUESTIONS_PER_GAME) endGame();
        else showQuestion();
      }, correct || timedOut ? 900 : 1200);
    }

    function highlightAnswers(q, choice, correct) {
      if (q.type === 'higher') {
        document.querySelectorAll('.flag-card').forEach((card) => {
          card.classList.add('disabled');
          const name = card.dataset.choice;
          if (name === q.correct) card.style.borderColor = 'var(--accent)';
          else if (name === choice && !correct) card.style.borderColor = 'var(--danger)';
        });
      } else {
        document.querySelectorAll('.option-btn').forEach((btn) => {
          btn.disabled = true;
          if (btn.textContent === q.correct) btn.classList.add('correct');
          else if (btn.textContent === choice && !correct) btn.classList.add('wrong');
        });
      }
    }

    function endGame() {
      clearTimer();
      const gs = gameState;
      const correctCount = gs.results.filter((r) => r.correct).length;
      const totalXp = getXp() + gs.xpThisGame;
      setXp(totalXp);
      updateXpUI();

      $('final-score').textContent = gs.score;
      $('results-summary').textContent = `${correctCount} / ${QUESTIONS_PER_GAME} correct · Best streak: ${gs.maxStreak}`;
      $('xp-earned').textContent = `+${gs.xpThisGame} XP earned`;

      const breakdown = $('breakdown');
      breakdown.innerHTML = '';
      gs.results.forEach((r, i) => {
        const item = document.createElement('div');
        item.className = 'breakdown-item';
        const flagSrc = r.q.visual.kind === 'flag' ? r.q.visual.src
          : r.q.visual.kind === 'dual' ? r.q.visual.a.flag
          : r.meta?.flag || '';
        const img = flagSrc ? `<img src="${flagSrc}" alt="" />` : '';
        item.innerHTML = `
          <span class="icon ${r.correct ? 'ok' : 'no'}">${r.correct ? '✓' : '✗'}</span>
          ${img}
          <div class="detail">
            <strong>Q${i + 1}: ${escapeHtml(r.type)}</strong>
            <small>${r.correct ? `+${r.points} pts` : `Answer: ${escapeHtml(r.answer)}`}${r.timedOut ? ' · Time out' : ''}</small>
          </div>`;
        breakdown.appendChild(item);
      });

      $('save-score-panel').classList.remove('hidden');
      $('player-name').value = '';
      showScreen('results');

      if (correctCount >= 7) fireConfetti(120);
    }

    function saveScore() {
      const name = $('player-name').value.trim() || 'Anonymous';
      const entry = {
        name,
        score: gameState.score,
        difficulty: gameState.difficulty,
        date: new Date().toISOString(),
      };
      const list = getLeaderboard();
      list.push(entry);
      list.sort((a, b) => b.score - a.score);
      saveLeaderboard(list.slice(0, 50));
      renderLeaderboard();
      $('save-score-panel').classList.add('hidden');
    }

    /* Confetti */
    const confettiCanvas = $('confetti-canvas');
    const ctx = confettiCanvas.getContext('2d');
    let particles = [];

    function resizeConfetti() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeConfetti);
    resizeConfetti();

    function fireConfetti(count = 60) {
      const colors = ['#00ff88', '#00cc6a', '#ffffff', '#ffaa00', '#44aaff'];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: confettiCanvas.width / 2 + (Math.random() - 0.5) * 200,
          y: confettiCanvas.height * 0.35,
          vx: (Math.random() - 0.5) * 12,
          vy: Math.random() * -14 - 4,
          w: Math.random() * 8 + 4,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * 360,
          vr: (Math.random() - 0.5) * 20,
          life: 1,
        });
      }
      if (!confettiAnim) animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      particles = particles.filter((p) => p.life > 0);
      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.35;
        p.rot += p.vr;
        p.life -= 0.012;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rot * Math.PI) / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      if (particles.length) {
        confettiAnim = requestAnimationFrame(animateConfetti);
      } else {
        confettiAnim = null;
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }

    /* Events */
    document.querySelectorAll('.diff-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach((b) => b.classList.remove('selected'));
        btn.classList.add('selected');
        difficulty = btn.dataset.diff;
      });
    });

    $('btn-start').addEventListener('click', startGame);
    $('btn-play-again').addEventListener('click', startGame);
    $('btn-menu').addEventListener('click', () => showScreen('menu'));
    $('btn-save-score').addEventListener('click', saveScore);
    $('btn-retry').addEventListener('click', loadCountries);

    loadCountries();
  </script>
</body>
</html>
